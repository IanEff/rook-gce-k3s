# Audit + Ignore, NOT Enforce: as of 2026-07-11 only thump-clank and
# thump-rattle are actually signed (verified live against Rekor) —
# thump-hiss and thump-thump have no .sig tag on GHCR yet. Flipping to
# Enforce before all four beats are signed would hard-deny hiss/thump pod
# creation cluster-wide the moment ArgoCD syncs. See CLAUDE.md gotcha #17
# for the full story and the checklist for flipping this to Enforce.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-thump-images
  annotations:
    policies.kyverno.io/title: Verify thump image signatures
    policies.kyverno.io/description: >-
      Audits ghcr.io/ianeff/thump-* pod images for a valid keyless cosign
      signature (Fulcio-issued cert, Rekor-logged). Audit/Ignore only until
      all four thump beats are signed and Enforce is turned on manually.
      See CLAUDE.md gotcha #17.
spec:
  validationFailureAction: Audit
  failurePolicy: Ignore
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-thump-image-signatures
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "ghcr.io/ianeff/thump-*"
          # Kyverno requires this explicit false whenever
          # validationFailureAction is Audit (audit mode can't safely
          # mutate the admitted object) — mutateDigest defaults to true,
          # and leaving it unset makes the whole ClusterPolicy invalid.
          # Confirmed live 2026-07-12: both `kyverno apply` and a
          # server-side dry-run against the cluster's own
          # validate-policy.kyverno.svc webhook rejected this file
          # without this field, which is why it had never actually synced.
          mutateDigest: false
          attestors:
            - entries:
                - keyless:
                    subject: "ian.furst@gmail.com"
                    issuer: "https://github.com/login/oauth"
                    rekor:
                      url: https://rekor.sigstore.dev
