apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: logging
helmCharts:
  - name: promtail
    repo: https://grafana.github.io/helm-charts
    version: 6.16.2
    releaseName: promtail
    namespace: logging
    valuesInline:
      config:
        clients:
          - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
