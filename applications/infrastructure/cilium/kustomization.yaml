apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system

components:
  - ../../config

resources:
  - gateway.yaml
  - gateway-tls-secret.yaml
  - hubble-ui-route.yaml
  - hubble-relay-route.yaml

helmCharts:
  - name: cilium
    repo: https://helm.cilium.io/
    version: 1.19.3
    releaseName: cilium
    namespace: kube-system
    includeCRDs: true
    valuesFile: values.yaml
    valuesInline:
      # k8sServiceHost is a literal placeholder — control-plane.sh's startup
      # script seds it to the real reserved static IP (same convention as
      # GITOPS_REPO_URL / gitops.env's CONTROL_PLANE_IP; see install_argocd.sh
      # step [5]). Kustomize replacements can't reach into helmCharts
      # valuesInline, so this has to stay a separate substitution target.
      k8sServiceHost: GCE_CONTROL_PLANE_IP_PLACEHOLDER
      k8sServicePort: 6443
      ipv4NativeRoutingCIDR: 10.244.0.0/16

patches:
  # Force operator's cluster-pool CIDR as a CLI arg so it can't lose a race
  # with the ConfigMap volume mount during initial bootstrap.
  - target:
      kind: Deployment
      name: cilium-operator
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --cluster-pool-ipv4-cidr=10.244.0.0/16
