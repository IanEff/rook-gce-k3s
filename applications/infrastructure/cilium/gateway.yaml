apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cilium-gateway
  namespace: kube-system
spec:
  gatewayClassName: cilium
  # No spec.addresses pin here — gatewayAPI.hostNetwork mode (values.yaml)
  # binds Envoy directly to whichever node it's scheduled on; there is no
  # floating LB IP to request (see gitops.env for why).
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS — TLS terminates here; static self-signed cert in gateway-tls-secret.yaml.
    # Use --insecure on the CLI; browsers can click through the warning.
    - name: https
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: gateway-tls

    # Cleartext gRPC for Hubble relay (Cilium proxies it, observes l7 flows)
    - name: hubble-relay
      port: 4245
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
