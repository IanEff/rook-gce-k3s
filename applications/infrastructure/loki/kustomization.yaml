apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: logging
resources:
  - namespace.yaml
helmCharts:
  - name: loki
    repo: https://grafana.github.io/helm-charts
    version: 6.6.2
    releaseName: loki
    namespace: logging
    valuesInline:
      deploymentMode: SingleBinary
      loki:
        auth_enabled: false
        commonConfig:
          replication_factor: 1
        storage:
          type: filesystem
        schemaConfig:
          configs:
            - from: "2024-01-01"
              store: tsdb
              object_store: filesystem
              schema: v13
              index:
                prefix: loki_index_
                period: 24h
        limits_config:
          retention_period: 24h
      singleBinary:
        replicas: 1
        persistence:
          enabled: true
          storageClass: rook-ceph-block
          size: 10Gi
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
      # Disable the microservice components not needed in single-binary mode
      gateway:
        enabled: false
      resultsCache:
        enabled: false
      chunksCache:
        enabled: false
      backend:
        replicas: 0
      read:
        replicas: 0
      write:
        replicas: 0
