# Standalone Prometheus — single-process, no operator. This chart reads NO
# monitoring.coreos.com CRs (no ServiceMonitor/PrometheusRule controller is
# deployed) — all scraping below is static/annotation-based, and Sloth's
# generated rules are rendered to plain rule groups at commit time (see
# serverFiles.recording_rules.yml / .alerting_rules.yml below, and
# provisioning/scripts/gen_slos.sh) rather than picked up live.

server:
  replicaCount: 1

  retention: "7d"
  retentionSize: "5GB"

  # Use CephFS RWO for metrics storage.
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: "local-path"

  nodeSelector:
    kubernetes.io/hostname: lima-ceph-control

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  global:
    scrape_interval: 30s
    scrape_timeout: 10s
    evaluation_interval: 30s

  # Emit cluster label on all series for multi-cluster Grafana queries.
  extraScrapeConfigs: |
    - job_name: 'prometheus-self'
      static_configs:
        - targets: ['localhost:9090']

alertmanager:
  enabled: false # Lab: no paging. Use Grafana unified alerting instead.

# node-exporter and kube-state-metrics are included in the chart.
prometheus-node-exporter:
  enabled: true
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# pushgateway not needed in a lab.
prometheus-pushgateway:
  enabled: false

# serverFiles keys become files in the server ConfigMap, mounted at
# /etc/config/. There is no ServiceMonitor/PrometheusRule discovery here —
# see the header comment above.
serverFiles:
  prometheus.yml:
    rule_files:
      - /etc/config/recording_rules.yml
      - /etc/config/alerting_rules.yml
    scrape_configs:
      # The chart's default scrape_configs already cover kubernetes-service-endpoints,
      # kubernetes-nodes, kubernetes-pods, etc. Only add custom targets below.



      # Hubble metrics (Cilium flow observability).
      - job_name: "hubble-metrics"
        static_configs:
          - targets:
              - "hubble-metrics.kube-system.svc.cluster.local:9965"
        relabel_configs:
          - target_label: job
            replacement: hubble

      # Ceph Latency Bridge (Native Histogram Reconstruction).
      - job_name: "ceph-latency-bridge"
        static_configs:
          - targets:
              - "ceph-latency-bridge.rook-ceph.svc.cluster.local:8080"
        relabel_configs:
          - target_label: job
            replacement: ceph-latency-bridge

      # ArgoCD application-controller metrics (argocd_app_info etc.) — needed
      # by the argocd-sync Sloth SLO.
      - job_name: "argocd-metrics"
        static_configs:
          - targets:
              - "argocd-metrics.argocd.svc.cluster.local:8082"
        relabel_configs:
          - target_label: job
            replacement: argocd-metrics

  # --- BEGIN sloth-generated recording rules (regenerate: just gen-slos) ---
  # Source: applications/infrastructure/sloth/prometheusservicelevels.yaml
  # DO NOT EDIT BY HAND — run `just gen-slos` after changing the source spec.
  recording_rules.yml:
    groups:
      - name: sloth-slo-sli-recordings-ceph-rgw-availability
        rules:
          - expr: |
              (sum(rate(ceph_rgw_failed_req[5m])))
              /
              (sum(rate(ceph_rgw_req[5m])))
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
              sloth_window: 5m
            record: slo:sli_error:ratio_rate5m
          - expr: |
              (sum(rate(ceph_rgw_failed_req[30m])))
              /
              (sum(rate(ceph_rgw_req[30m])))
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
              sloth_window: 30m
            record: slo:sli_error:ratio_rate30m
          - expr: |
              (sum(rate(ceph_rgw_failed_req[1h])))
              /
              (sum(rate(ceph_rgw_req[1h])))
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
              sloth_window: 1h
            record: slo:sli_error:ratio_rate1h
          - expr: |
              (sum(rate(ceph_rgw_failed_req[2h])))
              /
              (sum(rate(ceph_rgw_req[2h])))
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
              sloth_window: 2h
            record: slo:sli_error:ratio_rate2h
          - expr: |
              (sum(rate(ceph_rgw_failed_req[6h])))
              /
              (sum(rate(ceph_rgw_req[6h])))
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
              sloth_window: 6h
            record: slo:sli_error:ratio_rate6h
          - expr: |
              (sum(rate(ceph_rgw_failed_req[1d])))
              /
              (sum(rate(ceph_rgw_req[1d])))
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
              sloth_window: 1d
            record: slo:sli_error:ratio_rate1d
          - expr: |
              (sum(rate(ceph_rgw_failed_req[3d])))
              /
              (sum(rate(ceph_rgw_req[3d])))
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
              sloth_window: 3d
            record: slo:sli_error:ratio_rate3d
          - expr: |
              sum_over_time(slo:sli_error:ratio_rate5m{sloth_id="ceph-rgw-availability", sloth_service="ceph-rgw", sloth_slo="availability"}[30d])
              / ignoring (sloth_window)
              count_over_time(slo:sli_error:ratio_rate5m{sloth_id="ceph-rgw-availability", sloth_service="ceph-rgw", sloth_slo="availability"}[30d])
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
              sloth_window: 30d
            record: slo:sli_error:ratio_rate30d
      - name: sloth-slo-meta-recordings-ceph-rgw-availability
        rules:
          - expr: vector(0.9990000000000001)
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
            record: slo:objective:ratio
          - expr: vector(1-0.9990000000000001)
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
            record: slo:error_budget:ratio
          - expr: vector(30)
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
            record: slo:time_period:days
          - expr: |
              slo:sli_error:ratio_rate5m{sloth_id="ceph-rgw-availability", sloth_service="ceph-rgw", sloth_slo="availability"}
              / on(sloth_id, sloth_slo, sloth_service) group_left
              slo:error_budget:ratio{sloth_id="ceph-rgw-availability", sloth_service="ceph-rgw", sloth_slo="availability"}
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
            record: slo:current_burn_rate:ratio
          - expr: |
              slo:sli_error:ratio_rate30d{sloth_id="ceph-rgw-availability", sloth_service="ceph-rgw", sloth_slo="availability"}
              / on(sloth_id, sloth_slo, sloth_service) group_left
              slo:error_budget:ratio{sloth_id="ceph-rgw-availability", sloth_service="ceph-rgw", sloth_slo="availability"}
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
            record: slo:period_burn_rate:ratio
          - expr: 1 - slo:period_burn_rate:ratio{sloth_id="ceph-rgw-availability", sloth_service="ceph-rgw", sloth_slo="availability"}
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_service: ceph-rgw
              sloth_slo: availability
            record: slo:period_error_budget_remaining:ratio
          - expr: vector(1)
            labels:
              lab: ceph-lab
              sloth_id: ceph-rgw-availability
              sloth_mode: cli-gen-k8s
              sloth_objective: "99.9"
              sloth_service: ceph-rgw
              sloth_slo: availability
              sloth_spec: sloth.slok.dev/v1
              sloth_version: 0.16.0
            record: sloth_slo_info
      - name: sloth-slo-sli-recordings-ceph-osd-latency
        rules:
          - expr: |
              (sum(rate(ceph_osd_op_w_latency_count{job="ceph-latency-bridge"}[5m])) - sum(rate(ceph_osd_op_w_latency_bucket{job="ceph-latency-bridge",le="102.399999"}[5m])))
              /
              (sum(rate(ceph_osd_op_w_latency_count{job="ceph-latency-bridge"}[5m])))
            labels:
              lab: ceph-lab
              sloth_id: ceph-osd-latency
              sloth_service: ceph-osd
