              sloth_slo: latency
              sloth_window: 6h
            record: slo:sli_error:ratio_rate6h
          - expr: |
              (sum(rate(ceph_osd_op_w_latency_count{job="ceph-latency-bridge"}[1d])) - sum(rate(ceph_osd_op_w_latency_bucket{job="ceph-latency-bridge",le="102.399999"}[1d])))
