apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rook-ceph

resources:
  - namespace.yaml

helmCharts:
  - name: rook-ceph
    repo: https://charts.rook.io/release
    version: v1.19.4
    releaseName: rook-ceph
    namespace: rook-ceph
    valuesInline:
      # Allow the operator to create ServiceMonitors / PrometheusRules in rook-ceph.
      # Requires Prometheus Operator CRDs (kube-prometheus-stack wave -5).
      monitoring:
        enabled: true
      csi:
        enableRbdDriver: true
        enableCephfsDriver: true
        # Drastically lower CSI memory requests. Default 512Mi is way too high
        # for a 6GB lab node and starves the actual storage daemons.
        rbd:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
        cephfs:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      # Tune resource requests to coexist with Ceph daemons on worker nodes
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
