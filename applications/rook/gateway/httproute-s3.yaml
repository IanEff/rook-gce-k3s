---
# S3 / RGW HTTPRoute — routes s3.ceph.lab → rook-ceph-rgw-ceph-objectstore:80
# TLS terminates at the Cilium Gateway; backend is cleartext HTTP to RGW.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ceph-s3
  namespace: rook-ceph
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cilium-gateway
      namespace: kube-system
      sectionName: http
  hostnames:
    - s3.ceph.lab
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: rook-ceph-rgw-ceph-objectstore
          port: 80
          weight: 1
