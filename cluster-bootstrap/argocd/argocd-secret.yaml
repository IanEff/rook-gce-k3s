# ============================================================
# DEV/LAB ONLY — default ArgoCD admin password is "password"
# ============================================================
# This is intentional for a local Vagrant lab.  NEVER deploy
# this to a real cluster without changing the password first.
#
# To generate a new bcrypt hash:
#   htpasswd -nbBC 10 "" YOUR_NEW_PASSWORD | tr -d ':'
# Or with Python:
#   python3 -c "import bcrypt; print(bcrypt.hashpw(b'YOUR_PASSWORD', bcrypt.gensalt(rounds=10)).decode())"
#
# Then update admin.password below and commit.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
type: Opaque
stringData:
  # bcrypt hash of "password" — lab default, change for real deployments
  admin.password: "$2y$05$/DI4jDEYr4GfgfrGeb7JHeuMyylLsgTb5mfz1vPxUtKz5d1jQgBhW"
  admin.passwordMtime: "2026-01-01T00:00:00Z"
